apiVersion: 1

providers:
  - name: ticketing
    orgId: 1
    folder: Ticketing
    folderUid: ticketing
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
