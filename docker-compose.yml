name: ticketing-observability

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ticketing-obs-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=365d"
      - "--storage.tsdb.retention.size=20GB"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ticketing-observability

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ticketing-obs-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - ticketing-observability

  pushgateway:
    image: prom/pushgateway:v1.9.0
    container_name: ticketing-obs-pushgateway
    restart: unless-stopped
    ports:
      - "9091:9091"
    networks:
      - ticketing-observability

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: ticketing-obs-cadvisor
    restart: unless-stopped
    ports:
      - "8088:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - ticketing-observability

  k6:
    image: grafana/k6:0.53.0
    container_name: ticketing-obs-k6
    # No default command — invoke explicitly:
    #   docker compose run --rm k6 run /scripts/<scenario>.js
    profiles:
      - tools
    environment:
      K6_PROMETHEUS_RW_SERVER_URL: "http://prometheus:9090/api/v1/write"
    volumes:
      - ./k6/scripts:/scripts:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ticketing-observability

volumes:
  prometheus-data:
    name: ticketing-obs-prometheus-data
  grafana-data:
    name: ticketing-obs-grafana-data

networks:
  ticketing-observability:
    name: ticketing-observability
    driver: bridge
