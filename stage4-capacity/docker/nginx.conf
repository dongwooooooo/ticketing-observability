# Stage 4 LB — Nginx upstream round-robin.
# Sticky session 불필요: admit 상태가 Redis 에 있어 어느 인스턴스든 동일 결과.

events {
    worker_connections 4096;
}

http {
    upstream backend {
        # 두 backend 인스턴스. max_fails=2 / fail_timeout=5s 로 다운 시 자동 격리.
        server app1:28083 max_fails=2 fail_timeout=5s;
        server app2:28083 max_fails=2 fail_timeout=5s;
    }

    server {
        listen 80;

        # 모든 경로 LB. WaitingTokenController, ReservationController, PaymentController 등.
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 인스턴스 다운 시 자동 retry (다른 backend 로)
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_connect_timeout 3s;
            proxy_read_timeout 30s;
        }

        # health check
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
